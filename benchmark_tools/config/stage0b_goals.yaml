# Stage 0B Navigation Smoke Test Goals
#
# Counterclockwise rectangle: the robot traces a rectangular path around
# the 8m x 8m sandbox world, making only 90° left turns.
# Each forward step is 1m, well within the laser range (~4.5m).
#
# Usage:
#   ros2 run benchmark_tools run_navigation_smoke_test.py \
#     --goals benchmark_tools/config/stage0b_goals.yaml

goals:
  # ── Segment 1: East (3 goals) ─────────────────────────────────────────
  - name: "east_1m"
    description: "East 1m"
    frame_id: "map"
    yaw_deg: 0
    position:
      x: 1.0
      y: 0.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 0.0
      w: 1.0

  - name: "east_2m"
    description: "East 2m"
    frame_id: "map"
    yaw_deg: 0
    position:
      x: 2.0
      y: 0.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 0.0
      w: 1.0

  - name: "east_3m"
    description: "East 3m"
    frame_id: "map"
    yaw_deg: 0
    position:
      x: 3.0
      y: 0.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 0.0
      w: 1.0

  # ── Segment 2: North (2 goals) ────────────────────────────────────────
  - name: "north_1m"
    description: "North 1m"
    frame_id: "map"
    yaw_deg: 90
    position:
      x: 3.0
      y: 1.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 0.707
      w: 0.707

  - name: "north_2m"
    description: "North 2m"
    frame_id: "map"
    yaw_deg: 90
    position:
      x: 3.0
      y: 2.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 0.707
      w: 0.707

  # ── Segment 3: West (3 goals) ─────────────────────────────────────────
  - name: "west_1m"
    description: "West 1m"
    frame_id: "map"
    yaw_deg: 180
    position:
      x: 2.0
      y: 2.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 1.0
      w: 0.0

  - name: "west_2m"
    description: "West 2m"
    frame_id: "map"
    yaw_deg: 180
    position:
      x: 1.0
      y: 2.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 1.0
      w: 0.0

  - name: "west_3m"
    description: "West 3m"
    frame_id: "map"
    yaw_deg: 180
    position:
      x: 0.0
      y: 2.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 1.0
      w: 0.0

  # ── Segment 4: South (2 goals) ────────────────────────────────────────
  - name: "south_1m"
    description: "South 1m"
    frame_id: "map"
    yaw_deg: -90
    position:
      x: 0.0
      y: 1.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: -0.707
      w: 0.707

  - name: "finish"
    description: "Finish at origin"
    frame_id: "map"
    yaw_deg: 0
    position:
      x: 0.0
      y: 0.0
      z: 0.0
    orientation:
      x: 0.0
      y: 0.0
      z: 0.0
      w: 1.0
